<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1200" viewBox="0 0 900 1200" role="img" aria-labelledby="title desc">
  <title id="title">TOEFL 110 score showcase</title>
  <desc id="desc">A clean score card for a TOEFL 110 result with speaking 27.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff7f1"/>
      <stop offset="0.5" stop-color="#fffdf5"/>
      <stop offset="1" stop-color="#f3f7ff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff4fa3"/>
      <stop offset="0.35" stop-color="#ff8b42"/>
      <stop offset="0.68" stop-color="#37d98a"/>
      <stop offset="1" stop-color="#5a82ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#2d3978" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="900" height="1200" fill="url(#bg)"/>
  <circle cx="110" cy="130" r="130" fill="#ff4fa3" opacity="0.14"/>
  <circle cx="790" cy="190" r="150" fill="#5a82ff" opacity="0.14"/>
  <circle cx="730" cy="1010" r="170" fill="#ffd84d" opacity="0.18"/>
  <rect x="80" y="90" width="740" height="1020" rx="34" fill="#ffffff" opacity="0.92" filter="url(#shadow)"/>
  <rect x="80" y="90" width="740" height="14" rx="7" fill="url(#accent)"/>
  <text x="450" y="205" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="38" font-weight="800" fill="#1f2552">TOEFL iBT</text>
  <text x="450" y="275" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="120" font-weight="900" fill="#1f2552">110</text>
  <text x="450" y="335" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#6f78a0">Speaking 27</text>
  <rect x="170" y="415" width="560" height="2" fill="#e7eaf5"/>
  <g font-family="Arial, Helvetica, sans-serif">
    <text x="190" y="505" font-size="24" font-weight="700" fill="#6f78a0">Reading</text>
    <text x="710" y="505" font-size="34" font-weight="900" fill="#1f2552" text-anchor="end">28</text>
    <rect x="190" y="535" width="520" height="16" rx="8" fill="#edf1ff"/>
    <rect x="190" y="535" width="486" height="16" rx="8" fill="#5a82ff"/>
    <text x="190" y="620" font-size="24" font-weight="700" fill="#6f78a0">Listening</text>
    <text x="710" y="620" font-size="34" font-weight="900" fill="#1f2552" text-anchor="end">29</text>
    <rect x="190" y="650" width="520" height="16" rx="8" fill="#edf1ff"/>
    <rect x="190" y="650" width="503" height="16" rx="8" fill="#37d98a"/>
    <text x="190" y="735" font-size="24" font-weight="700" fill="#6f78a0">Speaking</text>
    <text x="710" y="735" font-size="34" font-weight="900" fill="#1f2552" text-anchor="end">27</text>
    <rect x="190" y="765" width="520" height="16" rx="8" fill="#edf1ff"/>
    <rect x="190" y="765" width="468" height="16" rx="8" fill="#ff8b42"/>
    <text x="190" y="850" font-size="24" font-weight="700" fill="#6f78a0">Writing</text>
    <text x="710" y="850" font-size="34" font-weight="900" fill="#1f2552" text-anchor="end">26</text>
    <rect x="190" y="880" width="520" height="16" rx="8" fill="#edf1ff"/>
    <rect x="190" y="880" width="451" height="16" rx="8" fill="#ff4fa3"/>
  </g>
  <rect x="170" y="965" width="560" height="92" rx="18" fill="#f8faff"/>
  <text x="450" y="1018" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="800" fill="#3d4778">4-week sprint from speaking 20 to 27</text>
</svg>
